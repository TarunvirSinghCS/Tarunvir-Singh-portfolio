<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="680" height="320" fill="white"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111111">basic network flow</text>

  <!-- ── Node 1: User Device ── -->
  <g>
    <rect x="24" y="110" width="120" height="56" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
    <text x="84" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#B5D4F4">User device</text>
    <text x="84" y="150" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#85B7EB">PC / phone</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="144" y1="138" x2="186" y2="138" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="165" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111111">TLS</text>

  <!-- ── Node 2: Router / NAT ── -->
  <g>
    <rect x="186" y="110" width="120" height="56" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="246" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9FE1CB">Router / NAT</text>
    <text x="246" y="150" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#5DCAA5">Hides private IP</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="306" y1="138" x2="336" y2="138" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Node 3: ISP / Internet Cloud ── -->
  <g>
    <path d="
      M 348,172
      Q 318,172 316,152
      Q 310,138 322,130
      Q 320,112 336,108
      Q 342,98  356,100
      Q 362,90  376,90
      Q 388,84  400,90
      Q 412,84  424,90
      Q 438,88  444,100
      Q 458,100 462,112
      Q 474,116 474,130
      Q 480,140 472,150
      Q 474,168 452,172
      Z"
      fill="#444441" stroke="#B4B2A9" stroke-width="1" stroke-linejoin="round"/>
    <text x="395" y="126" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D3D1C7">ISP /</text>
    <text x="395" y="146" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D3D1C7">Internet</text>
  </g>

  <!-- DNS label below cloud -->
  <text x="395" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111111">DNS lookup here</text>

  <!-- Arrow 3 -->
  <line x1="474" y1="138" x2="510" y2="138" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Node 4: Web Server ── -->
  <g>
    <rect x="510" y="110" width="140" height="56" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
    <text x="580" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#B5D4F4">Web server</text>
    <text x="580" y="150" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#85B7EB">Auth + response</text>
  </g>

  <!-- Return arrow (curved, below) -->
  <path d="M 580 166 Q 580 220 340 220 Q 100 220 84 166" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="340" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111111">response</text>

  <!-- Firewall note -->
  <text x="246" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111111">🔒 firewall here</text>

  <!-- Legend -->
  <line x1="24" y1="278" x2="56" y2="278" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="64" y="282" font-family="Arial, sans-serif" font-size="11" fill="#111111">request</text>
  <line x1="130" y1="278" x2="162" y2="278" stroke="#333" stroke-width="1" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="170" y="282" font-family="Arial, sans-serif" font-size="11" fill="#111111">response</text>
</svg>
