<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="680" height="620" fill="white"/>

  <!-- FLOW DIRECTION LABEL -->
  <text x="340" y="28" text-anchor="middle" opacity="0.6" font-family="Arial, sans-serif" font-size="12" fill="#000000">request flow →</text>

  <!-- Row 1: User Device -->
  <g>
    <rect x="254" y="48" width="172" height="56" rx="8" stroke-width="0.5" fill="#0C447C" stroke="#85B7EB"/>
    <text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B5D4F4">User device</text>
    <text x="340" y="88" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#85B7EB">Browser / client app</text>
  </g>

  <!-- Arrow 1 + label -->
  <line x1="340" y1="104" x2="340" y2="134" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="354" y="122" font-family="Arial, sans-serif" font-size="12" fill="#000000" opacity="0.7">HTTPS / TLS</text>

  <!-- Row 2: Firewall -->
  <g>
    <rect x="254" y="134" width="172" height="56" rx="8" stroke-width="0.5" fill="#712B13" stroke="#F0997B"/>
    <text x="340" y="156" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F5C4B3">Firewall</text>
    <text x="340" y="174" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#F0997B">Filters traffic, blocks threats</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="340" y1="190" x2="340" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Router + NAT -->
  <g>
    <rect x="254" y="220" width="172" height="56" rx="8" stroke-width="0.5" fill="#085041" stroke="#5DCAA5"/>
    <text x="340" y="242" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9FE1CB">Router / NAT</text>
    <text x="340" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5DCAA5">Maps private → public IP</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="340" y1="276" x2="340" y2="306" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 4: ISP -->
  <g>
    <rect x="254" y="306" width="172" height="56" rx="8" stroke-width="0.5" fill="#444441" stroke="#B4B2A9"/>
    <text x="340" y="328" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D3D1C7">ISP</text>
    <text x="340" y="346" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#B4B2A9">Routes packets across internet</text>
  </g>

  <!-- DNS side note -->
  <g>
    <rect x="474" y="306" width="148" height="56" rx="8" stroke-width="0.5" fill="#633806" stroke="#EF9F27"/>
    <text x="548" y="328" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FAC775">DNS resolver</text>
    <text x="548" y="346" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#EF9F27">Resolves domain → IP</text>
  </g>
  <line x1="426" y1="334" x2="474" y2="334" stroke="#555" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="449" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#000000" opacity="0.7">lookup</text>

  <!-- Arrow 4 -->
  <line x1="340" y1="362" x2="340" y2="392" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 5: Internet -->
  <g>
    <rect x="210" y="392" width="260" height="44" rx="22" stroke-width="0.5" fill="#444441" stroke="#B4B2A9"/>
    <text x="340" y="414" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D3D1C7">Internet (public network)</text>
  </g>

  <!-- Arrow 5 -->
  <line x1="340" y1="436" x2="340" y2="466" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 6: Web Server -->
  <g>
    <rect x="254" y="466" width="172" height="56" rx="8" stroke-width="0.5" fill="#0C447C" stroke="#85B7EB"/>
    <text x="340" y="488" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B5D4F4">Web server</text>
    <text x="340" y="506" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#85B7EB">Processes request, sends response</text>
  </g>

  <!-- Auth side note -->
  <g>
    <rect x="474" y="466" width="148" height="56" rx="8" stroke-width="0.5" fill="#3C3489" stroke="#AFA9EC"/>
    <text x="548" y="488" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#CECBF6">Auth service</text>
    <text x="548" y="506" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#AFA9EC">Verifies identity / token</text>
  </g>
  <line x1="426" y1="494" x2="474" y2="494" stroke="#555" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Return arrow (curved, right side) -->
  <path d="M426 488 Q620 488 620 334 Q620 134 426 104" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)" opacity="0.5"/>
  <text x="636" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#000000" opacity="0.7">response</text>

  <!-- LEGEND -->
  <rect x="40" y="392" width="148" height="86" rx="8" fill="none" stroke="#555" stroke-width="0.5" opacity="0.4"/>
  <text x="114" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#000000" opacity="0.7">legend</text>
  <line x1="56" y1="430" x2="88" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="96" y="434" font-family="Arial, sans-serif" font-size="12" fill="#000000">data flow</text>
  <line x1="56" y1="452" x2="88" y2="452" stroke="#555" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="96" y="456" font-family="Arial, sans-serif" font-size="12" fill="#000000">side call</text>
  <line x1="56" y1="474" x2="88" y2="474" stroke="#555" stroke-width="1" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)" opacity="0.5"/>
  <text x="96" y="478" font-family="Arial, sans-serif" font-size="12" fill="#000000">response</text>

  <!-- Security markers -->
  <text x="40" y="155" font-family="Arial, sans-serif" font-size="12" fill="#000000">🔒 security control</text>
  <text x="40" y="242" font-family="Arial, sans-serif" font-size="12" fill="#000000">🔁 NAT translation</text>
  <text x="40" y="488" font-family="Arial, sans-serif" font-size="12" fill="#000000">📋 logging / monitoring</text>
</svg>
